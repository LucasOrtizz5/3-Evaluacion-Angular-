<div class="container-xl mt-3">
  <div class="mb-3">
    <app-breadcrumb [items]="breadcrumbItems"></app-breadcrumb>
  </div>

  <div class="mb-5">
    @if (loading) {
      <app-loader [message]="loadingMessage"></app-loader>
    } @else if (hasError) {
      <div class="alert alert-danger">
        {{ errorMessage }}
      </div>
    } @else {
      <div class="row g-4 align-items-stretch">
        <div class="col-12 col-md-4 d-flex mt-3">
          <div class="card bg-black bg-opacity-50 text-secondary mt-3 w-100 p-4 pb-0 h-100">
            @if (mediaSrc) {
              <img
                [src]="mediaSrc"
                [alt]="mediaAlt"
                class="img-fluid w-100 rounded-3 img-cover-card img-cover-square"
              >
            } @else {
              <div class="detail-media-slot rounded-3">
                <ng-content select="[detail-media]"></ng-content>
              </div>
            }

            <div class="card bg-transparent text-secondary border-secondary mb-2 mt-3">
              <div class="card-header fw-bold border-secondary fs-5 detail-header-row">
                <span>{{ infoTitle }}</span>
                <div class="detail-header-actions">
                  <ng-content select="[detail-info-actions]"></ng-content>
                </div>
              </div>
              <div class="card-body">
                <ng-content select="[detail-info]"></ng-content>
              </div>
            </div>
          </div>
        </div>

        <div class="col-12 col-md-8 d-flex mt-3">
          <div class="card bg-black bg-opacity-50 text-secondary mt-3 w-100 d-flex flex-column h-100">
            <div class="card border-secondary m-4 d-flex flex-column bg-transparent text-secondary h-100">
              <div class="card-header fw-bold border-secondary fs-5">
                {{ contentTitle }}
              </div>
              <div class="card-body p-3 d-flex flex-column grow">
                <ng-content select="[detail-content]"></ng-content>
              </div>
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</div>
