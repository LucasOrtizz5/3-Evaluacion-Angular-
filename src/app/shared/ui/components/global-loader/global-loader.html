@if (isLoading()) {
  <div class="global-loader-overlay u-flex-center">
    <div class="global-loader-container u-flex-center">
      <div class="spinner-border text-primary" role="status" aria-label="Loading">
        <span class="visually-hidden">Navegando...</span>
      </div>
    </div>
  </div>
}
