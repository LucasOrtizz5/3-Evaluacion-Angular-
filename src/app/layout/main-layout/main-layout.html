<div class="d-flex flex-column min-vh-100">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark px-2 py-2"
       style="border-bottom: 1px solid var(--bs-primary); background-color: var(--bg-dark-grey-2);">

    <div class="container-fluid">

      <!-- Brand -->
      <a class="navbar-brand text-secondary"
         routerLink="/"
         routerLinkActive="active-tab"
         [routerLinkActiveOptions]="{ exact: true }">
        Rick & Morty
      </a>

      <!-- BOTON HAMBURGUESA MOBILE -->
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarContent">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- CONTENIDO COLAPSABLE -->
      <div class="collapse navbar-collapse" id="navbarContent">

        <!-- LINKS -->
        @if (isAuthenticated()) {
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">

          <li class="nav-item">
            <a class="nav-link"
               routerLink="/characters"
               routerLinkActive="active-tab">
              Characters
              <span class="badge bg-danger ms-2">
                {{ charactersCount() }}
              </span>
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link"
               routerLink="/episodes"
               routerLinkActive="active-tab">
              Episodes
              <span class="badge bg-danger ms-2">0</span>
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link"
               routerLink="/locations"
               routerLinkActive="active-tab">
              Locations
            </a>
          </li>

        </ul>
        }

        <!-- DERECHA -->
        <div class="d-flex flex-column flex-lg-row">
          @if (isAuthenticated()) {
            <span class="text-white px-lg-3 py-1">{{ user()?.name }}</span>
            <span class="text-secondary px-lg-3 py-1 cursor-pointer" (click)="goToProfile()">Profile</span>
            <span class="text-secondary px-lg-3 py-1 cursor-pointer" (click)="logout()">Log Out</span>
          }
        </div>

      </div>

    </div>
  </nav>

  <!-- CONTENIDO -->
  <div class="container-fluid bg-dark-custom text-light grow py-3">
    <router-outlet></router-outlet>
  </div>

  <!-- FOOTER -->
  <footer class="bg-black text-center text-light mt-auto">
    © Rick & Morty Wiki - All rights reserved to Lucas Ortiz
  </footer>

</div>
