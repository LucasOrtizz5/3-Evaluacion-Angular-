<div class="d-flex flex-column min-vh-100">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark px-2 py-2 app-navbar-surface">

    <div class="container-fluid">

      <!-- Brand -->
      <a class="navbar-brand text-secondary"
         routerLink="/"
         routerLinkActive="active-brand-tab"
         [routerLinkActiveOptions]="{ exact: true }">
        Rick & Morty
      </a>

      <!-- BOTON HAMBURGUESA MOBILE -->
      @if (isAuthenticated()) {
      <button
        class="navbar-toggler"
        type="button"
        (click)="toggleNavbar()"
        [attr.aria-expanded]="isNavbarOpen()"
        aria-controls="navbarContent"
        aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      }

      <!-- CONTENIDO COLAPSABLE -->
      <div class="navbar-collapse collapse" [class.show]="isNavbarOpen()" id="navbarContent">

        <!-- LINKS -->
        @if (isAuthenticated()) {
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">

          <li class="nav-item">
            <a class="nav-link"
               routerLink="/characters"
               (click)="closeNavbar()"
              routerLinkActive="active-nav-tab">
              Characters
              <span class="badge bg-danger ms-2">
                {{ charactersCount() }}
              </span>
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link"
               routerLink="/episodes"
               (click)="closeNavbar()"
              routerLinkActive="active-nav-tab">
              Episodes
              <span class="badge bg-danger ms-2">{{ episodesCount() }}</span>
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link"
               routerLink="/locations"
               (click)="closeNavbar()"
               routerLinkActive="active-nav-tab">
              Locations
              <span class="badge bg-danger ms-2">{{ locationsCount() }}</span>
            </a>
          </li>

        </ul>
        }

        <!-- DERECHA -->
        <div class="d-flex flex-column flex-lg-row">
          @if (isAuthenticated()) {
            <span class="text-white px-lg-3 py-1 cursor-pointer" (click)="goToProfile()">{{ user()?.name }}</span>
            <span class="text-secondary px-lg-3 py-1 cursor-pointer" (click)="logout()">Log Out</span>
          }
        </div>

      </div>

    </div>
  </nav>

  <!-- CONTENIDO -->
  <div class="container-fluid bg-dark-custom text-light grow py-3">
    <router-outlet></router-outlet>
  </div>

  <!-- FOOTER -->
  <footer class="bg-black text-center text-light mt-auto">
    © Rick & Morty Wiki - All rights reserved to Lucas Ortiz
  </footer>

</div>
