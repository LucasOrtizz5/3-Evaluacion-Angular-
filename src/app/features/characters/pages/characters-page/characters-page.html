<div class="container-xl mt-3">
  <div class="mb-3">
    <app-breadcrumb [items]="[
      { label: 'Home', url: '/' },
      { label: 'Characters' }
    ]"></app-breadcrumb>
  </div>

  <app-search-bar
    placeholder="Search characters..."
    (search)="onSearch($event)">
  </app-search-bar>

  @if (isLoading()) {

  <app-loader message="Cargando personajes..."></app-loader>

  } @else if (hasError()) {

  <div class="alert alert-danger">
    No se encontraron personajes. Intenta con otro nombre o recarga la página.
  </div>

  } @else {

  <div class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-4">
    @for (character of visibleCharacters(); track character.id) {
      <div class="col">
        <a [routerLink]="['/characters', character.id]" class="text-decoration-none">
          <div class="card bg-dark text-light border-0 h-100">
            <img [src]="character.image" class="card-img-top img-fluid w-100 rounded-3 img-cover-card img-cover-card--sm" [alt]="character.name">
            <div class="card-body">
              <h5 class="card-title">
                {{ character.name }}
              </h5>
            </div>
          </div>
        </a>
      </div>
    }
  </div>

  }

  <app-pagination-controls
    [isLoading]="isLoading()"
    [hasError]="hasError()"
    [currentPage]="currentPage()"
    [totalPages]="totalPages()"
    [pages]="pages()"
    (pageChange)="goToPage($event)">
  </app-pagination-controls>

</div>
